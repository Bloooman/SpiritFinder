<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpiritFinder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f3ef;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 2rem; letter-spacing: -0.5px; }
    header p  { color: #666; margin-top: 0.25rem; }

    /* ── search bar ── */
    .search-bar {
      display: flex;
      gap: 0.5rem;
      max-width: 600px;
      margin: 0 auto 2rem;
    }
    .search-input-wrap {
      position: relative;
      flex: 1;
    }
    .search-bar input {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-bar input:focus { border-color: #5a3e28; }
    .search-bar button {
      padding: 0.65rem 1.4rem;
      background: #5a3e28;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .search-bar button:hover  { background: #3e2a18; }
    .search-bar button:disabled { background: #aaa; cursor: not-allowed; }

    /* ── autocomplete dropdown ── */
    #ac-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,.12);
      z-index: 200;
      overflow: hidden;
    }
    #ac-dropdown.visible { display: block; }
    .ac-item {
      padding: 0.55rem 1rem;
      cursor: pointer;
      font-size: 0.93rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #1a1a1a;
    }
    .ac-item:hover, .ac-item.focused { background: #f5f3ef; }
    .ac-icon { font-size: 0.72rem; color: #aaa; flex-shrink: 0; }

    /* ── spinner / status ── */
    .spinner { display: none; text-align: center; padding: 2rem; color: #666; }
    .spinner.active { display: block; }
    #status { text-align: center; color: #666; margin-bottom: 1rem; min-height: 1.4em; }

    /* ── results table ── */
    .table-wrap { overflow-x: auto; max-width: 960px; margin: 0 auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    thead th {
      background: #5a3e28;
      color: #fff;
      text-align: left;
      padding: 0.75rem 1rem;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    tbody tr { border-bottom: 1px solid #f0ece6; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #faf8f5; }
    tbody tr.best-price { background: #edf7ed; }
    tbody tr.best-price:hover { background: #e2f2e2; }
    tbody tr.error-row { background: #fff5f5; color: #c0392b; }
    td { padding: 0.7rem 1rem; font-size: 0.95rem; vertical-align: middle; }

    .price-cell { font-weight: 700; font-size: 1.05rem; }
    .best-badge {
      display: inline-block;
      background: #27ae60;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.4rem;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .stock-yes { color: #27ae60; font-weight: 600; }
    .stock-no  { color: #c0392b; font-weight: 600; }
    a.product-link { color: #5a3e28; text-decoration: none; font-weight: 600; }
    a.product-link:hover { text-decoration: underline; }

    .empty { text-align: center; padding: 3rem; color: #999; display: none; }
    .empty.active { display: block; }

    /* ── saved list ── */
    .save-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 0.15rem;
      color: #ccc;
      transition: color 0.15s, transform 0.1s;
      vertical-align: middle;
    }
    .save-btn:hover { color: #e8a020; transform: scale(1.2); }
    .save-btn.saved { color: #e8a020; }
    .saved-item {
      border-radius: 6px;
      border: 1px solid #e8e0d6;
      overflow: hidden;
      margin-bottom: 0.35rem;
    }
    .saved-item-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.88rem;
      background: #f9f6f2;
      padding: 0.4rem 0.7rem;
    }
    .saved-notes-row {
      display: none;
      padding: 0.4rem 0.7rem;
      background: #fff9f0;
    }
    .saved-notes-row.open { display: flex; gap: 0.4rem; align-items: center; }
    .saved-notes-input {
      flex: 1;
      padding: 0.25rem 0.5rem;
      border: 1.5px solid #ddd;
      border-radius: 5px;
      font-size: 0.85rem;
      outline: none;
      background: #fff;
    }
    .saved-notes-input:focus { border-color: #5a3e28; }

    /* ── manual entry ── */
    .manual-btn {
      margin-left: 0.6rem;
      padding: 0.15rem 0.5rem;
      font-size: 0.75rem;
      background: none;
      border: 1px solid #c0392b;
      color: #c0392b;
      border-radius: 4px;
      cursor: pointer;
      vertical-align: middle;
      transition: background 0.15s, color 0.15s;
    }
    .manual-btn:hover { background: #c0392b; color: #fff; }
    .manual-entry-row td { background: #fff9f0 !important; }
    .manual-form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      padding: 0.25rem 0;
    }
    .manual-form input[type="text"],
    .manual-form input[type="number"],
    .manual-form input[type="url"] {
      padding: 0.3rem 0.55rem;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      font-size: 0.88rem;
      outline: none;
    }
    .manual-form input:focus { border-color: #5a3e28; }
    .manual-form label { font-size: 0.82rem; color: #555; display: flex; align-items: center; gap: 0.3rem; }
    .manual-save-btn {
      padding: 0.3rem 0.8rem;
      background: #5a3e28;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.88rem;
      cursor: pointer;
    }
    .manual-save-btn:hover { background: #3e2a18; }
    .manual-cancel-btn {
      padding: 0.3rem 0.6rem;
      background: none;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 0.88rem;
      cursor: pointer;
      color: #555;
    }
    .manual-cancel-btn:hover { background: #eee; }
    .manual-badge {
      display: inline-block;
      background: #e8a020;
      color: #fff;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 0.12rem 0.35rem;
      border-radius: 4px;
      margin-left: 0.4rem;
      vertical-align: middle;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── add-store panel ── */
    .add-store-wrap {
      max-width: 600px;
      margin: 3rem auto 0;
    }
    .add-store-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: none;
      border: none;
      border-top: 1px solid #ddd;
      padding: 0.9rem 0;
      font-size: 0.9rem;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      letter-spacing: 0.02em;
    }
    .add-store-toggle:hover { color: #222; }
    .add-store-toggle .arrow { transition: transform 0.2s; }
    .add-store-toggle.open .arrow { transform: rotate(180deg); }

    .add-store-panel {
      display: none;
      padding: 1rem 0 0.5rem;
    }
    .add-store-panel.open { display: block; }

    .store-url-row {
      display: flex;
      gap: 0.5rem;
    }
    .store-url-row input {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .store-url-row input:focus { border-color: #5a3e28; }
    .store-url-row button {
      padding: 0.6rem 1.2rem;
      background: #5a3e28;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .store-url-row button:hover { background: #3e2a18; }
    .store-url-row button:disabled { background: #aaa; cursor: not-allowed; }

    #add-progress {
      margin-top: 0.75rem;
      font-size: 0.88rem;
      color: #555;
      min-height: 1.3em;
    }
    #add-progress.error { color: #c0392b; }
    #add-progress.success { color: #27ae60; }

    .store-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 1rem;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: #e8e0d6;
      color: #3e2a18;
      padding: 0.25rem 0.55rem 0.25rem 0.7rem;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .chip.new { background: #d4edda; color: #155724; }
    .chip-rename {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.75rem;
      color: inherit;
      opacity: 0.55;
      padding: 0;
      line-height: 1;
    }
    .chip-rename:hover { opacity: 1; }
    .chip-edit-input {
      border: none;
      outline: none;
      background: transparent;
      font: inherit;
      font-weight: 600;
      color: inherit;
      width: 12ch;
      border-bottom: 1.5px solid currentColor;
      padding: 0;
    }
    #stores-label {
      font-size: 0.78rem;
      color: #999;
      margin-top: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: none;
    }
    #stores-label.visible { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>🥃 SpiritFinder</h1>
    <p>Search across multiple stores and find the best price.</p>
  </header>

  <form class="search-bar" id="search-form">
    <div class="search-input-wrap">
      <input type="text" id="query" placeholder="e.g. Lagavulin 16 or Ardbeg" autocomplete="off" required />
      <div id="ac-dropdown"></div>
    </div>
    <button type="submit" id="search-btn">Search</button>
  </form>

  <div id="status"></div>
  <div class="spinner" id="spinner">Searching all stores&hellip;</div>

  <div class="table-wrap" id="table-wrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>Store</th><th>Bottle</th><th>Price</th>
          <th>Size</th><th>In Stock</th><th>Link</th><th></th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>
  <div class="empty" id="empty-msg">No results found. Try a different search term.</div>

  <!-- ── Saved List panel ── -->
  <div class="add-store-wrap">
    <button class="add-store-toggle" id="saved-toggle-btn" type="button">
      <span>Saved List</span>
      <span id="saved-count-badge" style="display:none;background:#e8a020;color:#fff;font-size:0.72rem;font-weight:700;padding:0.1rem 0.45rem;border-radius:10px;margin-left:0.4rem"></span>
      <span class="arrow">▾</span>
    </button>
    <div class="add-store-panel" id="saved-panel">
      <div id="saved-empty" style="font-size:0.88rem;color:#999;padding:0.5rem 0">
        No saved entries yet — star a result row to save it here.
      </div>
      <div id="saved-entries"></div>
    </div>
  </div>

  <!-- ── Add Manual Entry panel ── -->
  <div class="add-store-wrap">
    <button class="add-store-toggle" id="manual-toggle-btn" type="button">
      <span>Add Manual Entry</span>
      <span class="arrow">▾</span>
    </button>
    <div class="add-store-panel" id="manual-panel">
      <div class="manual-form" id="persistent-manual-form" style="flex-direction:column;align-items:stretch;gap:0.5rem">
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
          <input type="text" id="pm-store" placeholder="Store name" style="flex:1;min-width:10rem" />
          <input type="text" id="pm-name" placeholder="Bottle name" style="flex:2;min-width:14rem" />
        </div>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center">
          <input type="number" id="pm-price" placeholder="Price $" step="0.01" min="0" style="width:8rem" />
          <input type="text" id="pm-size" placeholder="Size (e.g. 750ml)" style="width:9rem" />
          <input type="url" id="pm-url" placeholder="URL (optional)" style="flex:1;min-width:12rem" />
          <label style="font-size:0.85rem;color:#555;display:flex;align-items:center;gap:0.3rem">
            <input type="checkbox" id="pm-stock" checked /> In stock
          </label>
          <button class="manual-save-btn" id="pm-save-btn">Save Entry</button>
        </div>
      </div>
      <div id="pm-status" style="margin-top:0.5rem;font-size:0.85rem;min-height:1.2em"></div>
      <div id="pm-entries-label" style="font-size:0.78rem;color:#999;margin-top:1rem;text-transform:uppercase;letter-spacing:0.05em;display:none">Saved manual entries</div>
      <div id="pm-entries" style="margin-top:0.5rem;display:flex;flex-direction:column;gap:0.35rem"></div>
    </div>
  </div>

  <!-- ── Add Store panel ── -->
  <div class="add-store-wrap">
    <button class="add-store-toggle" id="toggle-btn" type="button">
      <span>Manage Stores</span>
      <span class="arrow">▾</span>
    </button>
    <div class="add-store-panel" id="add-panel">
      <div class="store-url-row">
        <input type="url" id="store-url" placeholder="https://www.example-liquor-store.com/" />
        <button type="button" id="add-btn">Add Store</button>
      </div>
      <div style="margin-top:0.5rem">
        <input type="text" id="store-name" placeholder="Store name (optional — auto-detected if blank)"
          style="width:100%;padding:0.45rem 0.8rem;border:1.5px solid #ddd;border-radius:6px;font-size:0.88rem;outline:none;color:#333" />
      </div>
      <div id="add-progress"></div>
      <div id="stores-label">Active stores</div>
      <div class="store-chips" id="store-chips"></div>
    </div>
  </div>

  <script>
    // ── helpers ──────────────────────────────────────────────────────────────
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }
    function fmt(price) {
      return price == null ? '—' : '$' + price.toFixed(2);
    }

    // ── store chips ──────────────────────────────────────────────────────────
    const chipsEl   = document.getElementById('store-chips');
    const labelEl   = document.getElementById('stores-label');

    async function refreshChips(newName) {
      try {
        const res = await fetch('/scrapers');
        const list = await res.json();
        chipsEl.innerHTML = '';
        list.forEach(s => {
          const chip = document.createElement('span');
          chip.className = 'chip' + (s.name === newName ? ' new' : '');

          const label = document.createElement('span');
          label.textContent = s.name;
          chip.appendChild(label);

          const btn = document.createElement('button');
          btn.className = 'chip-rename';
          btn.title = 'Rename';
          btn.textContent = '✎';
          btn.addEventListener('click', () => {
            // Swap label for an inline input
            const input = document.createElement('input');
            input.className = 'chip-edit-input';
            input.value = s.name;
            input.size = Math.max(s.name.length, 8);
            chip.replaceChild(input, label);
            btn.textContent = '✓';
            btn.title = 'Save';
            input.focus();
            input.select();

            const commit = async () => {
              const fresh = input.value.trim();
              if (fresh && fresh !== s.name) {
                const res = await fetch('/rename-store', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ old_name: s.name, new_name: fresh }),
                });
                const d = await res.json();
                if (!d.ok) { chip.replaceChild(label, input); btn.textContent = '✎'; btn.title = 'Rename'; return; }
              }
              refreshChips(fresh || s.name);
            };

            const cancel = () => {
              chip.replaceChild(label, input);
              btn.textContent = '✎';
              btn.title = 'Rename';
            };

            input.addEventListener('keydown', e => {
              if (e.key === 'Enter') { e.preventDefault(); commit(); }
              if (e.key === 'Escape') cancel();
            });
            input.addEventListener('blur', () => setTimeout(cancel, 150));

            // Second click on ✓ commits
            btn.onclick = (e) => { e.stopPropagation(); commit(); };
          });
          chip.appendChild(btn);
          chipsEl.appendChild(chip);
        });
        labelEl.className = list.length > 0 ? 'visible' : '';
      } catch {}
    }
    refreshChips();

    // ── saved list ───────────────────────────────────────────────────────────
    const savedToggleBtn = document.getElementById('saved-toggle-btn');
    const savedPanel     = document.getElementById('saved-panel');
    savedToggleBtn.addEventListener('click', () => {
      const open = savedPanel.classList.toggle('open');
      savedToggleBtn.classList.toggle('open', open);
    });

    async function refreshSavedList() {
      const res  = await fetch('/saved-list');
      const list = await res.json();
      const container = document.getElementById('saved-entries');
      const emptyEl   = document.getElementById('saved-empty');
      const badge     = document.getElementById('saved-count-badge');
      container.innerHTML = '';
      emptyEl.style.display  = list.length ? 'none' : '';
      badge.style.display    = list.length ? '' : 'none';
      badge.textContent      = list.length;

      list.forEach((e, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'saved-item';

        const row = document.createElement('div');
        row.className = 'saved-item-row';
        row.innerHTML = `
          <span style="font-weight:600;color:#3e2a18">${esc(e.store_name)}</span>
          <span style="color:#ccc">|</span>
          <span style="flex:1">${esc(e.bottle_name)}</span>
          ${e.price != null ? `<span style="font-weight:700">${fmt(e.price)}</span>` : ''}
          ${e.size  ? `<span style="color:#888">${esc(e.size)}</span>` : ''}
          ${e.url   ? `<a class="product-link" href="${esc(e.url)}" target="_blank" rel="noreferrer" style="font-size:0.82rem">View →</a>` : ''}
        `;

        // Notes toggle
        const notesBtn = document.createElement('button');
        notesBtn.title = e.notes ? 'Edit note' : 'Add note';
        notesBtn.textContent = e.notes ? '📝' : '✎';
        notesBtn.style.cssText = 'background:none;border:none;cursor:pointer;font-size:0.9rem;color:#aaa;padding:0';
        notesBtn.addEventListener('mouseover', () => { notesBtn.style.color = '#5a3e28'; });
        notesBtn.addEventListener('mouseout',  () => { notesBtn.style.color = '#aaa'; });

        // Remove button
        const delBtn = document.createElement('button');
        delBtn.textContent = '✕';
        delBtn.title = 'Remove from saved list';
        delBtn.style.cssText = 'background:none;border:none;color:#ccc;cursor:pointer;font-size:0.9rem;padding:0 0.1rem';
        delBtn.addEventListener('mouseover', () => { delBtn.style.color = '#c0392b'; });
        delBtn.addEventListener('mouseout',  () => { delBtn.style.color = '#ccc'; });
        delBtn.addEventListener('click', async () => {
          await fetch('/saved-list/' + i, { method: 'DELETE' });
          refreshSavedList();
        });

        row.appendChild(notesBtn);
        row.appendChild(delBtn);

        // Notes row
        const notesRow = document.createElement('div');
        notesRow.className = 'saved-notes-row' + (e.notes ? ' open' : '');
        const notesInput = document.createElement('input');
        notesInput.type = 'text';
        notesInput.className = 'saved-notes-input';
        notesInput.placeholder = 'Add a note…';
        notesInput.value = e.notes || '';
        const notesSave = document.createElement('button');
        notesSave.textContent = 'Save';
        notesSave.className = 'manual-save-btn';
        notesSave.style.cssText = 'font-size:0.8rem;padding:0.25rem 0.65rem';
        notesSave.addEventListener('click', async () => {
          await fetch('/saved-list/' + i, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ notes: notesInput.value.trim() }),
          });
          refreshSavedList();
        });
        notesInput.addEventListener('keydown', e => { if (e.key === 'Enter') notesSave.click(); });
        notesRow.appendChild(notesInput);
        notesRow.appendChild(notesSave);

        notesBtn.addEventListener('click', () => {
          notesRow.classList.toggle('open');
          if (notesRow.classList.contains('open')) notesInput.focus();
        });

        wrap.appendChild(row);
        wrap.appendChild(notesRow);
        container.appendChild(wrap);
      });
    }
    refreshSavedList();

    // ── manual entry panel (persistent) ─────────────────────────────────────
    const manualToggleBtn = document.getElementById('manual-toggle-btn');
    const manualPanel     = document.getElementById('manual-panel');
    manualToggleBtn.addEventListener('click', () => {
      const open = manualPanel.classList.toggle('open');
      manualToggleBtn.classList.toggle('open', open);
    });

    async function refreshManualEntries() {
      const res  = await fetch('/manual-entries');
      const list = await res.json();
      const container = document.getElementById('pm-entries');
      const labelEl2  = document.getElementById('pm-entries-label');
      container.innerHTML = '';
      labelEl2.style.display = list.length ? 'block' : 'none';

      list.forEach((e, i) => {
        const wrap = document.createElement('div');
        wrap.style.cssText = 'border-radius:6px;overflow:hidden;border:1px solid #e8e0d6';

        // ── display row ──
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:0.5rem;font-size:0.88rem;background:#f9f6f2;padding:0.35rem 0.6rem';
        row.innerHTML = `
          <span style="font-weight:600;color:#3e2a18">${esc(e.store_name)}</span>
          <span style="color:#ccc">|</span>
          <span>${esc(e.bottle_name)}</span>
          <span style="font-weight:700">${fmt(e.price)}</span>
          ${e.size ? `<span style="color:#888">${esc(e.size)}</span>` : ''}
          ${e.in_stock ? '' : '<span style="color:#c0392b;font-size:0.8rem">out of stock</span>'}
        `;

        const editBtn = document.createElement('button');
        editBtn.textContent = '✎ Edit';
        editBtn.title = 'Edit';
        editBtn.style.cssText = 'margin-left:auto;background:none;border:1px solid #bbb;border-radius:4px;color:#555;cursor:pointer;font-size:0.78rem;padding:0.1rem 0.45rem;white-space:nowrap';
        editBtn.addEventListener('mouseover', () => { editBtn.style.borderColor='#5a3e28'; editBtn.style.color='#5a3e28'; });
        editBtn.addEventListener('mouseout',  () => { editBtn.style.borderColor='#bbb';    editBtn.style.color='#555'; });

        const delBtn = document.createElement('button');
        delBtn.textContent = '✕';
        delBtn.title = 'Remove';
        delBtn.style.cssText = 'background:none;border:none;color:#ccc;cursor:pointer;font-size:0.9rem;padding:0 0.15rem';
        delBtn.addEventListener('mouseover', () => { delBtn.style.color='#c0392b'; });
        delBtn.addEventListener('mouseout',  () => { delBtn.style.color='#ccc'; });
        delBtn.addEventListener('click', async () => {
          await fetch('/manual-entry/' + i, { method: 'DELETE' });
          refreshManualEntries();
        });

        row.appendChild(editBtn);
        row.appendChild(delBtn);

        // ── edit form (hidden by default) ──
        const editRow = document.createElement('div');
        editRow.style.cssText = 'display:none;background:#fff9f0;padding:0.6rem 0.7rem';
        editRow.innerHTML = `
          <div style="display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.4rem">
            <input type="text" class="ef-store" value="${esc(e.store_name)}" placeholder="Store name" style="flex:1;min-width:9rem;padding:0.28rem 0.5rem;border:1.5px solid #ccc;border-radius:5px;font-size:0.85rem;outline:none" />
            <input type="text" class="ef-name" value="${esc(e.bottle_name)}" placeholder="Bottle name" style="flex:2;min-width:12rem;padding:0.28rem 0.5rem;border:1.5px solid #ccc;border-radius:5px;font-size:0.85rem;outline:none" />
          </div>
          <div style="display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center">
            <input type="number" class="ef-price" value="${e.price}" step="0.01" min="0" placeholder="Price $" style="width:7rem;padding:0.28rem 0.5rem;border:1.5px solid #ccc;border-radius:5px;font-size:0.85rem;outline:none" />
            <input type="text" class="ef-size" value="${esc(e.size||'')}" placeholder="Size" style="width:8rem;padding:0.28rem 0.5rem;border:1.5px solid #ccc;border-radius:5px;font-size:0.85rem;outline:none" />
            <input type="url" class="ef-url" value="${esc(e.url||'')}" placeholder="URL (optional)" style="flex:1;min-width:11rem;padding:0.28rem 0.5rem;border:1.5px solid #ccc;border-radius:5px;font-size:0.85rem;outline:none" />
            <label style="font-size:0.82rem;color:#555;display:flex;align-items:center;gap:0.25rem">
              <input type="checkbox" class="ef-stock" ${e.in_stock ? 'checked' : ''} /> In stock
            </label>
            <button class="ef-save manual-save-btn" style="font-size:0.82rem;padding:0.28rem 0.7rem">Save</button>
            <button class="ef-cancel manual-cancel-btn" style="font-size:0.82rem;padding:0.28rem 0.6rem">Cancel</button>
          </div>
        `;

        editBtn.addEventListener('click', () => {
          editRow.style.display = editRow.style.display === 'none' ? 'block' : 'none';
        });

        editRow.querySelector('.ef-cancel').addEventListener('click', () => {
          editRow.style.display = 'none';
        });

        editRow.querySelector('.ef-save').addEventListener('click', async () => {
          const store = editRow.querySelector('.ef-store').value.trim();
          const name  = editRow.querySelector('.ef-name').value.trim();
          const price = parseFloat(editRow.querySelector('.ef-price').value);
          if (!store || !name || isNaN(price)) return;
          await fetch('/manual-entry/' + i, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              store_name: store,
              bottle_name: name,
              price,
              size: editRow.querySelector('.ef-size').value.trim(),
              in_stock: editRow.querySelector('.ef-stock').checked,
              url: editRow.querySelector('.ef-url').value.trim(),
            }),
          });
          refreshManualEntries();
        });

        wrap.appendChild(row);
        wrap.appendChild(editRow);
        container.appendChild(wrap);
      });
    }
    refreshManualEntries();

    document.getElementById('pm-save-btn').addEventListener('click', async () => {
      const store = document.getElementById('pm-store').value.trim();
      const name  = document.getElementById('pm-name').value.trim();
      const price = parseFloat(document.getElementById('pm-price').value);
      const statusEl2 = document.getElementById('pm-status');

      if (!store || !name || isNaN(price)) {
        statusEl2.style.color = '#c0392b';
        statusEl2.textContent = 'Store name, bottle name, and price are required.';
        return;
      }

      await fetch('/manual-entry', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          store_name: store,
          bottle_name: name,
          price,
          size: document.getElementById('pm-size').value.trim(),
          in_stock: document.getElementById('pm-stock').checked,
          url: document.getElementById('pm-url').value.trim(),
        }),
      });

      document.getElementById('pm-store').value  = '';
      document.getElementById('pm-name').value   = '';
      document.getElementById('pm-price').value  = '';
      document.getElementById('pm-size').value   = '';
      document.getElementById('pm-url').value    = '';
      document.getElementById('pm-stock').checked = true;
      statusEl2.style.color = '#27ae60';
      statusEl2.textContent = `✓ Saved "${name}" — will appear in future searches.`;
      setTimeout(() => { statusEl2.textContent = ''; }, 4000);
      refreshManualEntries();
    });

    // ── toggle panel ─────────────────────────────────────────────────────────
    const toggleBtn = document.getElementById('toggle-btn');
    const addPanel  = document.getElementById('add-panel');
    toggleBtn.addEventListener('click', () => {
      const open = addPanel.classList.toggle('open');
      toggleBtn.classList.toggle('open', open);
    });

    // ── add store ────────────────────────────────────────────────────────────
    const addBtn      = document.getElementById('add-btn');
    const storeUrlEl  = document.getElementById('store-url');
    const progressEl  = document.getElementById('add-progress');

    const STAGES = [
      'Finding search form…',
      'Testing search…',
      'Detecting product cards…',
      'Generating scraper…',
    ];
    let stageTimer = null;

    function startProgress() {
      let i = 0;
      progressEl.className = '';
      progressEl.textContent = STAGES[0];
      stageTimer = setInterval(() => {
        i = (i + 1) % STAGES.length;
        progressEl.textContent = STAGES[i];
      }, 5000);
    }
    function stopProgress() {
      if (stageTimer) { clearInterval(stageTimer); stageTimer = null; }
    }

    addBtn.addEventListener('click', async () => {
      const url = storeUrlEl.value.trim();
      if (!url) return;

      addBtn.disabled = true;
      startProgress();

      try {
        const customName = document.getElementById('store-name').value.trim();
        const res = await fetch('/add-store', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, name: customName }),
        });
        const data = await res.json();
        stopProgress();

        if (data.ok) {
          progressEl.className = 'success';
          const found = data.results_found ?? 0;
          progressEl.textContent =
            `✓ Added "${esc(data.store_name)}" — ${found} result${found !== 1 ? 's' : ''} found during test.`;
          storeUrlEl.value = '';
          document.getElementById('store-name').value = '';
          await refreshChips(data.store_name);
        } else {
          progressEl.className = 'error';
          progressEl.textContent = `✗ ${data.error || 'Failed to add store.'} (stage: ${data.stage})`;
        }
      } catch (err) {
        stopProgress();
        progressEl.className = 'error';
        progressEl.textContent = '✗ Request failed: ' + err.message;
      } finally {
        addBtn.disabled = false;
      }
    });

    // ── autocomplete ─────────────────────────────────────────────────────────
    const queryEl    = document.getElementById('query');
    const acDropdown = document.getElementById('ac-dropdown');

    const HISTORY_KEY = 'sf_history';
    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
    }
    function addHistory(q) {
      const h = [q, ...getHistory().filter(x => x !== q)].slice(0, 20);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
    }

    let _acItems = [];
    let _focusIdx = -1;
    let _acTimer  = null;

    function hideAc() {
      acDropdown.classList.remove('visible');
      _focusIdx = -1;
    }

    function renderAc(items) {
      _acItems = items;
      _focusIdx = -1;
      acDropdown.innerHTML = '';
      if (!items.length) { hideAc(); return; }
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'ac-item';
        const icon = document.createElement('span');
        icon.className = 'ac-icon';
        icon.textContent = item.type === 'history' ? '⏱' : '⌕';
        div.appendChild(icon);
        const txt = document.createElement('span');
        txt.textContent = item.text;
        div.appendChild(txt);
        div.addEventListener('mousedown', e => { e.preventDefault(); pickAc(i); });
        acDropdown.appendChild(div);
      });
      acDropdown.classList.add('visible');
    }

    function moveFocus(delta) {
      _focusIdx = Math.max(-1, Math.min(_acItems.length - 1, _focusIdx + delta));
      Array.from(acDropdown.children).forEach((el, i) =>
        el.classList.toggle('focused', i === _focusIdx));
    }

    function pickAc(idx) {
      const item = _acItems[idx];
      if (!item) return;
      queryEl.value = item.text;
      hideAc();
      document.getElementById('search-form').dispatchEvent(new Event('submit'));
    }

    async function refreshAc() {
      const q = queryEl.value.trim();
      if (q.length < 2) {
        const hist = getHistory().slice(0, 6).map(t => ({ text: t, type: 'history' }));
        renderAc(hist);
        return;
      }
      const [suggests] = await Promise.all([
        fetch(`/suggest?q=${encodeURIComponent(q)}`).then(r => r.json()).catch(() => []),
      ]);
      const histMatches = getHistory()
        .filter(h => h.toLowerCase().includes(q.toLowerCase()))
        .slice(0, 3)
        .map(t => ({ text: t, type: 'history' }));
      const suggestItems = suggests
        .filter(t => !histMatches.some(h => h.text === t))
        .map(t => ({ text: t, type: 'suggest' }));
      renderAc([...histMatches, ...suggestItems].slice(0, 10));
    }

    queryEl.addEventListener('input', () => {
      clearTimeout(_acTimer);
      _acTimer = setTimeout(refreshAc, 200);
    });

    queryEl.addEventListener('focus', () => {
      if (queryEl.value.trim().length < 2) {
        const hist = getHistory().slice(0, 6).map(t => ({ text: t, type: 'history' }));
        if (hist.length) renderAc(hist);
      }
    });

    queryEl.addEventListener('keydown', e => {
      if (!acDropdown.classList.contains('visible')) return;
      if (e.key === 'ArrowDown') { e.preventDefault(); moveFocus(1); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); moveFocus(-1); }
      else if (e.key === 'Enter' && _focusIdx >= 0) { e.preventDefault(); pickAc(_focusIdx); }
      else if (e.key === 'Escape') hideAc();
    });

    queryEl.addEventListener('blur', () => setTimeout(hideAc, 150));

    // ── search ───────────────────────────────────────────────────────────────
    const form     = document.getElementById('search-form');
    const searchBtn = document.getElementById('search-btn');
    const spinner  = document.getElementById('spinner');
    const tbody    = document.getElementById('results-body');
    const tableWrap = document.getElementById('table-wrap');
    const emptyMsg  = document.getElementById('empty-msg');
    const statusEl  = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAc();
      const query = queryEl.value.trim();
      if (!query) return;
      addHistory(query);

      searchBtn.disabled = true;
      spinner.classList.add('active');
      tableWrap.style.display = 'none';
      emptyMsg.classList.remove('active');
      statusEl.textContent = '';
      tbody.innerHTML = '';

      try {
        const res = await fetch('/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query }),
        });
        const results = await res.json();

        const priced = results.filter(r => !r.error && r.price != null);
        const errors = results.filter(r => r.error);
        const lowestPrice = priced.length > 0 ? priced[0].price : null;

        if (results.length === 0) {
          emptyMsg.classList.add('active');
        } else {
          tableWrap.style.display = '';
          priced.forEach((r, i) => {
            const isBest = r.price === lowestPrice && i === 0;
            const tr = document.createElement('tr');
            tr.dataset.price = r.price;
            if (isBest) tr.classList.add('best-price');
            tr.innerHTML = `
              <td>${esc(r.store_name)}</td>
              <td>${esc(r.bottle_name)}${r.manual ? '<span class="manual-badge">Manual</span>' : ''}</td>
              <td class="price-cell">${fmt(r.price)}${isBest ? '<span class="best-badge">Best</span>' : ''}</td>
              <td>${r.size ? esc(r.size) : '—'}</td>
              <td class="${r.in_stock ? 'stock-yes' : 'stock-no'}">${r.in_stock ? 'Yes' : 'No'}</td>
              <td>${r.url ? `<a class="product-link" href="${esc(r.url)}" target="_blank" rel="noreferrer">View →</a>` : '—'}</td>
              <td></td>
            `;
            // Star button — added via DOM so the click listener stays clean
            const starTd  = tr.querySelector('td:last-child');
            const starBtn = document.createElement('button');
            starBtn.className = 'save-btn';
            starBtn.title = 'Save to list';
            starBtn.textContent = '☆';
            starBtn.addEventListener('click', async () => {
              if (starBtn.classList.contains('saved')) return;
              starBtn.classList.add('saved');
              starBtn.textContent = '★';
              starBtn.title = 'Saved';
              await fetch('/saved-list', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  store_name: r.store_name,
                  bottle_name: r.bottle_name,
                  price: r.price,
                  size: r.size || null,
                  url: r.url || '',
                  in_stock: r.in_stock,
                }),
              });
              refreshSavedList();
            });
            starTd.appendChild(starBtn);
            tbody.appendChild(tr);
          });

          errors.forEach(r => {
            const tr = document.createElement('tr');
            tr.classList.add('error-row');

            const manualBtnId = 'mb-' + Math.random().toString(36).slice(2);
            tr.innerHTML = `
              <td>${esc(r.store_name)}</td>
              <td colspan="5">
                Error: ${esc(r.error_message || 'scrape failed')}
                <button class="manual-btn" id="${manualBtnId}">Enter manually</button>
              </td>
            `;
            tbody.appendChild(tr);

            // Insert a hidden form row right after the error row
            const formTr = document.createElement('tr');
            formTr.classList.add('manual-entry-row');
            formTr.style.display = 'none';
            formTr.innerHTML = `
              <td colspan="6">
                <div class="manual-form">
                  <input type="text" placeholder="Bottle name" class="mf-name" style="width:16rem" />
                  <input type="number" placeholder="Price $" class="mf-price" step="0.01" min="0" style="width:7rem" />
                  <input type="text" placeholder="Size (e.g. 750ml)" class="mf-size" style="width:8rem" />
                  <input type="url" placeholder="URL (optional)" class="mf-url" style="width:14rem" />
                  <label><input type="checkbox" class="mf-stock" checked /> In stock</label>
                  <button class="manual-save-btn">Save</button>
                  <button class="manual-cancel-btn" type="button">Cancel</button>
                </div>
              </td>
            `;
            tbody.appendChild(formTr);

            document.getElementById(manualBtnId).addEventListener('click', () => {
              formTr.style.display = '';
              formTr.querySelector('.mf-name').focus();
            });

            formTr.querySelector('.manual-cancel-btn').addEventListener('click', () => {
              formTr.style.display = 'none';
            });

            formTr.querySelector('.manual-save-btn').addEventListener('click', async () => {
              const name  = formTr.querySelector('.mf-name').value.trim();
              const price = parseFloat(formTr.querySelector('.mf-price').value);
              if (!name || isNaN(price)) {
                formTr.querySelector('.mf-name').focus();
                return;
              }
              const payload = {
                store_name: r.store_name,
                bottle_name: name,
                price,
                size: formTr.querySelector('.mf-size').value.trim(),
                in_stock: formTr.querySelector('.mf-stock').checked,
                url: formTr.querySelector('.mf-url').value.trim(),
              };
              await fetch('/manual-entry', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
              });

              // Insert result row immediately, re-sort table
              formTr.style.display = 'none';
              tr.style.display = 'none';

              const newTr = document.createElement('tr');
              newTr.dataset.price = price;
              newTr.dataset.manual = '1';
              newTr.innerHTML = `
                <td>${esc(r.store_name)}</td>
                <td>${esc(name)}<span class="manual-badge">Manual</span></td>
                <td class="price-cell">${fmt(price)}</td>
                <td>${payload.size ? esc(payload.size) : '—'}</td>
                <td class="${payload.in_stock ? 'stock-yes' : 'stock-no'}">${payload.in_stock ? 'Yes' : 'No'}</td>
                <td>${payload.url ? `<a class="product-link" href="${esc(payload.url)}" target="_blank" rel="noreferrer">View →</a>` : '—'}</td>
              `;

              // Insert before the first error/manual row or at end of priced rows
              const rows = Array.from(tbody.querySelectorAll('tr:not(.error-row):not(.manual-entry-row)'));
              let inserted = false;
              for (const row of rows) {
                const rowPrice = parseFloat(row.dataset.price);
                if (!isNaN(rowPrice) && price < rowPrice) {
                  tbody.insertBefore(newTr, row);
                  inserted = true;
                  break;
                }
              }
              if (!inserted) {
                // Insert before first error row
                const firstError = tbody.querySelector('.error-row');
                if (firstError) tbody.insertBefore(newTr, firstError);
                else tbody.appendChild(newTr);
              }

              // Update best-price highlighting
              const allPriced = Array.from(tbody.querySelectorAll('tr:not(.error-row):not(.manual-entry-row)'));
              allPriced.forEach(row => row.classList.remove('best-price'));
              if (allPriced.length > 0) {
                const bestRow = allPriced.reduce((a, b) =>
                  parseFloat(a.dataset.price) <= parseFloat(b.dataset.price) ? a : b);
                bestRow.classList.add('best-price');
              }
            });
          });

          const found = priced.length;
          const errCount = errors.length;
          statusEl.textContent =
            `${found} result${found !== 1 ? 's' : ''} across ${found + errCount} store${found + errCount !== 1 ? 's' : ''}` +
            (errCount ? ` (${errCount} store${errCount !== 1 ? 's' : ''} failed)` : '');
        }
      } catch (err) {
        statusEl.textContent = 'Search failed: ' + err.message;
      } finally {
        searchBtn.disabled = false;
        spinner.classList.remove('active');
      }
    });
  </script>
</body>
</html>
